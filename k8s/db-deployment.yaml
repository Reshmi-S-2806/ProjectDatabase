apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: "reshmi_admin"
        - name: POSTGRES_PASSWORD
          value: "shopeasy_pass"
        - name: POSTGRES_DB
          value: "shopeasy_db"
